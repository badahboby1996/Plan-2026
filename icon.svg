<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Хъсъл · лого: нискополигонен юмрук от вулканичен камък с лава в пукнатините -->
  <defs>
    <clipPath id="bg"><rect width="512" height="512" rx="112"/></clipPath>
    <clipPath id="fist">
      <path d="M330 512 L205 370 L140 335 L70 290 L48 232 L92 210 L78 152 L130 132 L122 74 L182 60 L198 22 L262 32 L302 14 L354 62 L422 142 L512 292 L512 512 Z"/>
    </clipPath>
    <linearGradient id="lava" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FF3D00"/>
      <stop offset="55%" stop-color="#FF6B1A"/>
      <stop offset="100%" stop-color="#FFA94D"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g clip-path="url(#bg)">
    <rect width="512" height="512" fill="#0B0908"/>

    <!-- юмрук: силует + фасети (low-poly) -->
    <path d="M330 512 L205 370 L140 335 L70 290 L48 232 L92 210 L78 152 L130 132 L122 74 L182 60 L198 22 L262 32 L302 14 L354 62 L422 142 L512 292 L512 512 Z" fill="#1D1712"/>
    <g clip-path="url(#fist)">
      <polygon points="330,512 205,370 380,380" fill="#272019"/>
      <polygon points="380,380 512,512 330,512" fill="#191410"/>
      <polygon points="380,380 512,292 512,512" fill="#231C15"/>
      <polygon points="205,370 270,300 380,380" fill="#2C241B"/>
      <polygon points="380,380 422,142 512,292" fill="#1F1913"/>
      <polygon points="270,300 354,62 422,142" fill="#2A221A"/>
      <polygon points="270,300 380,380 422,142" fill="#171310"/>
      <polygon points="140,335 205,370 270,300" fill="#221B15"/>
      <polygon points="140,335 270,300 180,250" fill="#2E251C"/>
      <polygon points="70,290 140,335 180,250" fill="#251E17"/>
      <polygon points="48,232 70,290 160,236" fill="#332A1F"/>
      <polygon points="92,210 78,152 168,190" fill="#2B231B"/>
      <polygon points="92,210 168,190 180,250" fill="#211A14"/>
      <polygon points="130,132 122,74 206,150" fill="#302720"/>
      <polygon points="130,132 206,150 168,190" fill="#241D17"/>
      <polygon points="182,60 198,22 244,124" fill="#362C21"/>
      <polygon points="182,60 244,124 206,150" fill="#272019"/>
      <polygon points="262,32 302,14 300,124" fill="#31281E"/>
      <polygon points="302,14 354,62 300,124" fill="#261F18"/>
      <polygon points="244,124 300,124 270,300" fill="#1C1712"/>
      <polygon points="206,150 244,124 270,300" fill="#282019"/>
      <polygon points="168,190 206,150 270,300" fill="#1A1511"/>
      <polygon points="180,250 168,190 270,300" fill="#261F18"/>
      <polygon points="300,124 354,62 270,300" fill="#1D1813"/>
    </g>

    <!-- лава в пукнатините -->
    <g fill="none" stroke="url(#lava)" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
      <!-- главна жила по ръката -->
      <path d="M415 512 L350 412 L300 352 L262 300 L238 256" stroke-width="12"/>
      <!-- към кутрето -->
      <path d="M262 300 L185 292 L118 272 L62 252" stroke-width="7"/>
      <path d="M185 292 L152 322" stroke-width="3"/>
      <!-- към безименния -->
      <path d="M238 256 L162 208 L112 178 L88 152" stroke-width="7"/>
      <path d="M162 208 L124 232" stroke-width="3"/>
      <!-- към средния -->
      <path d="M238 256 L196 170 L160 118 L140 90" stroke-width="7"/>
      <path d="M196 170 L214 108 L206 66" stroke-width="3.5"/>
      <!-- към показалеца -->
      <path d="M238 256 L246 160 L234 82 L226 42" stroke-width="6"/>
      <path d="M246 160 L274 116 L288 60" stroke-width="3.5"/>
      <!-- към горния десен ръб на юмрука -->
      <path d="M262 300 L330 220 L366 150 L358 100" stroke-width="6"/>
      <path d="M330 220 L382 198" stroke-width="3"/>
      <!-- странични жилки по ръката -->
      <path d="M350 412 L428 368 L490 346" stroke-width="4"/>
      <path d="M415 512 L468 468" stroke-width="4"/>
      <path d="M300 352 L252 388" stroke-width="3"/>
    </g>
    <!-- по-ярко ядро на главната жила -->
    <path d="M415 512 L350 412 L300 352 L262 300 L238 256" fill="none" stroke="#FFC46B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".8"/>

    <!-- искри -->
    <g fill="#FF7A2E">
      <circle cx="95" cy="60" r="5"/>
      <circle cx="132" cy="92" r="3.5" opacity=".9"/>
      <circle cx="70" cy="112" r="3.5" opacity=".8"/>
      <circle cx="162" cy="52" r="3" opacity=".9"/>
      <circle cx="110" cy="142" r="2.6" opacity=".7"/>
      <circle cx="186" cy="94" r="2.4" opacity=".6"/>
      <circle cx="58" cy="172" r="2.8" opacity=".7"/>
      <circle cx="142" cy="28" r="2.4" opacity=".8"/>
      <circle cx="212" cy="58" r="2" opacity=".6"/>
      <circle cx="88" cy="192" r="2" opacity=".5"/>
      <circle cx="46" cy="80" r="2.2" opacity=".55"/>
    </g>
  </g>
</svg>
