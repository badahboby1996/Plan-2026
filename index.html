  const [newTask, setNewTask] = useState("");
  const [newTime, setNewTime] = useState("");
  const [addOpen, setAddOpen] = useState(false);
  const saveT = useRef(null);
  const docRef = useMemo(() => db.collection("planners").doc(DOC_ID), []);

  const key = dk(date);
  const cd = challengeDay(date);
  const work = isWorkday(date);
  const mi = mealIdx(date);
  const pDay = ((cd - 1) % 30 + 30) % 30;
  const prog = PROGRAM[pDay];
  const cont = CONTENT[pDay];
  const cycle = Math.floor((cd - 1) / 30) + 1;
  const checks = data.checks[key] || {};
  const refl = data.refl[key] || {};
  const tasks = data.tasks[key] || [];

  /* --- Firestore load/save --- */
  useEffect(() => {
    let alive = true;
    (async () => {
      try {
        const doc = await docRef.get();
        if (alive && doc.exists && doc.data().json) setData(JSON.parse(doc.data().json));
        setSync("запазено");
      } catch (e) { setSync("грешка при зареждане"); }
      setLoaded(true);
    })();
    return () => { alive = false; };
  }, [docRef]);

  useEffect(() => {
    if (!loaded) return;
    setSync("запис…");
    clearTimeout(saveT.current);
    saveT.current = setTimeout(async () => {
      try {
        await docRef.set({ json: JSON.stringify(data), updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
        setSync("запазено");
      } catch (e) { setSync("грешка при запис"); }
    }, 700);
    return () => clearTimeout(saveT.current);
  }, [data, loaded, docRef]);

  /* --- mutations --- */
  const toggle = (id) => setData((d) => {
    const day = { ...(d.checks[key] || {}) };
    if (day[id]) delete day[id]; else day[id] = true;
    return { ...d, checks: { ...d.checks, [key]: day } };
  });
  const setRefl = (patch) => setData((d) => ({ ...d, refl: { ...d.refl, [key]: { ...(d.refl[key] || {}), ...patch } } }));
  const addTask = () => {
    const t = newTask.trim(); if (!t) return;
    setData((d) => ({ ...d, tasks: { ...d.tasks, [key]: [...(d.tasks[key] || []), { id: Date.now(), t, time: newTime, done: false }] } }));
    setNewTask(""); setNewTime(""); setAddOpen(false);
  };
  const toggleTask = (id) => setData((d) => ({ ...d, tasks: { ...d.tasks, [key]: (d.tasks[key] || []).map((x) => x.id === id ? { ...x, done: !x.done } : x) } }));
  const delTask = (id) => setData((d) => ({ ...d, tasks: { ...d.tasks, [key]: (d.tasks[key] || []).filter((x) => x.id !== id) } }));

  /* --- derived --- */
  const exDone = prog.rest ? 0 : prog.ex.filter((_, i) => checks[`ex${i}`]).length;
  const exAll = prog.rest ? 0 : prog.ex.length;
  const workoutDone = !prog.rest && exDone === exAll && exAll > 0;

  const dayUnits = useMemo(() => {
    const u = [];
    u.push(checks.wake);
    if (!prog.rest) u.push(workoutDone);
    for (let i = 0; i < 4; i++) u.push(checks[`meal${i}`]);
    u.push(checks.content);
    u.push(checks.evening);
    tasks.forEach((t) => u.push(t.done));
    return u;
  }, [checks, tasks, prog, workoutDone]);
  const dayPct = dayUnits.length ? dayUnits.filter(Boolean).length / dayUnits.length : 0;

  const totals = useMemo(() => {
    let workouts = 0, meals = 0;
    for (const k of Object.keys(data.checks)) {
      const c = data.checks[k];
      const d2 = new Date(k + "T00:00:00");
      const p = PROGRAM[((challengeDay(d2) - 1) % 30 + 30) % 30];
      if (!p.rest && p.ex.every((_, i) => c[`ex${i}`])) workouts++;
      for (let i = 0; i < 4; i++) if (c[`meal${i}`]) meals++;
    }
    const refls = Object.values(data.refl).filter((r) => r.rate || r.plus || r.minus || r.note).length;
    return { workouts, meals, refls };
  }, [data]);

  const streak = (habitId) => {
    let s = 0; let d2 = new Date(date);
    while (challengeDay(d2) >= 1) {
      if ((data.checks[dk(d2)] || {})[habitId]) { s++; d2 = addDays(d2, -1); } else break;
    }
    return s;
  };

  const nav = (n) => { const d2 = addDays(date, n); if (d2 >= START && d2 <= END) { setDate(d2); setOpenMeal(null); setOpenEx(null); } };
  const isToday = dk(date) === dk(clampDate(new Date()));

  /* --- дневна линия --- */
  const timeline = [];
  timeline.push({ id: "wake", time: "05:30", t: "Ставане + вода", s: "Телефонът остава далеч първите 30 мин", k: "habit" });
  if (!prog.rest) timeline.push({ id: "__workout", time: "06:15", t: `Тренировка · ${prog.t}`, s: `${prog.dur} мин · ${exDone}/${exAll} упражнения`, k: "train", nav: "train", done: workoutDone });
  timeline.push({ id: "meal0", time: "07:30", t: `Закуска · ${MEALS[mi][0].n}`, s: MEALS[mi][0].dev.join(" · "), k: "food", nav: "food" });
  if (work) timeline.push({ id: "__leave", time: "09:10", t: "Тръгване за работа", k: "info" });
  timeline.push({ id: "meal1", time: "13:00", t: `Обяд · ${MEALS[mi][1].n}`, s: MEALS[mi][1].dev.join(" · "), k: "food", nav: "food" });
  timeline.push({ id: "meal2", time: "16:30", t: `Следобед · ${MEALS[mi][2].n}`, s: MEALS[mi][2].dev.join(" · "), k: "food", nav: "food" });
  if (work) timeline.push({ id: "__home", time: "19:30", t: "Прибиране", k: "info" });
  timeline.push({ id: "meal3", time: work ? "20:00" : "19:30", t: `Вечеря · ${MEALS[mi][3].n}`, s: MEALS[mi][3].dev.join(" · "), k: "food", nav: "food" });
  timeline.push({ id: "content", time: "21:00", t: `Контент · ${cont.f}`, s: cont.h, k: "cam", nav: "content" });
  timeline.push({ id: "evening", time: "22:00", t: "Вечерна рутина", s: "Телефон извън спалнята · 20 страници четене", k: "habit" });

  const iconFor = { habit: "habit", food: "bowl", train: "train", cam: "cam", info: "chev" };

  if (!loaded) return <div className="app"><Style /><div className="loading"><Icon name="flame" size={34} /><span>Жарава се разпалва…</span></div></div>;

  return (
    <div className="app">
      <Style />

      {/* HEADER */}
      <header className="hdr">
        <div className="hdrTop">
          <div className="brand"><Icon name="flame" size={16} /><span>ЖАРАВА</span></div>
          <div className="hdrTopR">
            <span className={`sync ${sync.indexOf("грешка") === 0 ? "err" : ""}`}>{sync}</span>
          </div>
        </div>
        <div className="hdrMain">
          <Ring pct={Math.max(dayPct, 0.02)} day={cd} />
          <div className="hdrInfo">
            <div className="dateNav">
              <button className="navBtn" onClick={() => nav(-1)} disabled={challengeDay(date) <= 1} aria-label="Предишен ден"><span style={{ transform: "rotate(180deg)", display: "inline-flex" }}><Icon name="chev" size={16} /></span></button>
              <div className="dateLbl">
                <strong>{DOW[date.getDay()]}</strong>
                <span>{date.getDate()} {MON[date.getMonth()]} · {work ? "работен ден" : "почивен ден"}</span>
              </div>
              <button className="navBtn" onClick={() => nav(1)} disabled={dk(date) === dk(END)} aria-label="Следващ ден"><Icon name="chev" size={16} /></button>
            </div>
            <div className="hdrMeta">
              <span className="pct">{Math.round(dayPct * 100)}% от деня</span>
              {!isToday && <button className="todayBtn" onClick={() => setDate(clampDate(new Date()))}>към днес</button>}
            </div>
          </div>
        </div>
      </header>

      {/* CONTENT */}
      <main className="main">

        {tab === "today" && (
          <section>
            <div className="stats">
              <div className="stat"><b>{totals.workouts}</b><span>тренировки</span></div>
              <div className="stat"><b>{totals.meals}</b><span>хранения</span></div>
              <div className="stat"><b>{totals.refls}</b><span>рефлексии</span></div>
            </div>

            <h2 className="secT">Планът за деня</h2>
            <div className="tl">
              {timeline.map((it) => it.k === "info" ? (
                <div key={it.id} className="tlInfo"><span className="tlTime">{it.time}</span><span>{it.t}</span></div>
              ) : (
                <div key={it.id} className={`tlItem ${(it.id === "__workout" ? it.done : checks[it.id]) ? "done" : ""}`}>
                  <span className="tlTime">{it.time}</span>
                  <div className="tlIco"><Icon name={iconFor[it.k]} size={17} /></div>
                  <button className="tlBody" onClick={() => it.nav && setTab(it.nav)}>
                    <span className="tlT">{it.t}</span>
                    {it.s && <span className="tlS">{it.s}</span>}
                  </button>
                  {it.id === "__workout"
                    ? <Check on={it.done} onTap={() => setTab("train")} />
                    : <Check on={!!checks[it.id]} onTap={() => toggle(it.id)} />}
                </div>
              ))}

              {tasks.map((t) => (
                <div key={t.id} className={`tlItem custom ${t.done ? "done" : ""}`}>
                  <span className="tlTime">{t.time || "—"}</span>
                  <div className="tlIco"><Icon name="plus" size={15} /></div>
                  <div className="tlBody"><span className="tlT">{t.t}</span><span className="tlS">твоя задача</span></div>
                  <Check on={t.done} onTap={() => toggleTask(t.id)} />
                  <button className="del" onClick={() => delTask(t.id)} aria-label="Изтрий"><Icon name="x" size={13} /></button>
                </div>
              ))}
            </div>

            {addOpen ? (
              <div className="addForm">
                <input className="inp" placeholder="Задача (напр. подстрижка)" value={newTask} onChange={(e) => setNewTask(e.target.value)} />
                <input className="inp time" placeholder="час" value={newTime} onChange={(e) => setNewTime(e.target.value)} />
                <button className="btn" onClick={addTask}>Добави</button>
                <button className="btnGhost" onClick={() => setAddOpen(false)}>Откажи</button>
              </div>
            ) : (
              <button className="addBtn" onClick={() => setAddOpen(true)}><Icon name="plus" size={15} /> Добави задача за {date.getDate()} {MON[date.getMonth()]}</button>
            )}

            {/* РЕФЛЕКСИЯ */}
            <h2 className="secT">Вечерна рефлексия</h2>
            <div className="card refl">
              <span className="lbl">Как беше денят?</span>
              <div className="flames">
                {[1, 2, 3, 4, 5].map((n) => (
                  <button key={n} className={`flame ${refl.rate >= n ? "lit" : ""}`} onClick={() => setRefl({ rate: refl.rate === n ? 0 : n })} aria-label={`Оценка ${n}`}>
                    <Icon name="flame" size={24} />
                  </button>
                ))}
              </div>
              <span className="lbl">Какво проработи</span>
              <textarea className="ta" rows={2} value={refl.plus || ""} onChange={(e) => setRefl({ plus: e.target.value })} placeholder="Едно нещо, което свърши работа днес…" />
              <span className="lbl">Какво не проработи</span>
              <textarea className="ta" rows={2} value={refl.minus || ""} onChange={(e) => setRefl({ minus: e.target.value })} placeholder="Без извинения — какво се разпадна…" />
              <span className="lbl">Бележка към бъдещия ти</span>
              <textarea className="ta" rows={2} value={refl.note || ""} onChange={(e) => setRefl({ note: e.target.value })} placeholder="Мисъл, идея за контент, каквото и да е…" />
            </div>
          </section>
        )}

        {tab === "food" && (
          <section>
            <h2 className="secT">Меню · {DOW[date.getDay()].toLowerCase()}</h2>
            <p className="secS">~2250 ккал · 190 г протеин · 70 г мазнини · 215 г въглехидрати</p>
            {MEALS[mi].map((m, i) => (
              <div key={i} className={`card meal ${checks[`meal${i}`] ? "done" : ""}`}>
                <button className="mealHead" onClick={() => setOpenMeal(openMeal === i ? null : i)}>
                  <div className="mealHeadL">
                    <span className="eyebrow">{MEAL_TYPES[i]}</span>
                    <span className="mealN">{m.n}</span>
                    <div className="chips">{m.dev.map((d) => <span key={d} className="chip">{d}</span>)}</div>
                  </div>
                  <span className={`car ${openMeal === i ? "up" : ""}`}><Icon name="chev" size={16} /></span>
                </button>
                {openMeal === i && (
                  <div className="mealBody">
                    <span className="lbl">Продукти</span>
                    <p className="ing">{m.ing}</p>
                    <span className="lbl">Приготвяне</span>
                    <ol className="steps">{m.steps.map((s, j) => <li key={j}>{s}</li>)}</ol>
                  </div>
                )}
                <div className="mealFoot">
                  <span>{checks[`meal${i}`] ? "Изядено ✓" : "Отметни, когато е изядено"}</span>
                  <Check on={!!checks[`meal${i}`]} onTap={() => toggle(`meal${i}`)} />
                </div>
              </div>
            ))}
          </section>
        )}

        {tab === "train" && (
          <section>
            <h2 className="secT">Тренировка · Ден {pDay + 1} от 30 {cycle > 1 && <span className="cyc">цикъл {cycle}</span>}</h2>
            {prog.rest ? (
              <div className="card restCard">
                <Icon name="flame" size={26} />
                <strong>Почивен ден</strong>
                <p>{prog.note}</p>
                <p className="secS">Дисциплината включва и почивка. Жаравата тлее — не гасне.</p>
              </div>
            ) : (
              <>
                <p className="secS">{prog.t} · ~{prog.dur} мин {prog.note && `· ${prog.note}`}</p>
                <div className="exProg"><div className="exProgBar" style={{ width: `${exAll ? (exDone / exAll) * 100 : 0}%` }} /></div>
                {prog.ex.map(([name, reps], i) => (
                  <div key={i} className={`card ex ${checks[`ex${i}`] ? "done" : ""}`}>
                    <div className="exRow">
                      <button className="exHead" onClick={() => setOpenEx(openEx === i ? null : i)}>
                        <span className="exN">{name}</span>
                        <span className="exR">{reps}</span>
                      </button>
                      <Check on={!!checks[`ex${i}`]} onTap={() => toggle(`ex${i}`)} />
                    </div>
                    {openEx === i && <p className="exDesc">{EX[name]}</p>}
                  </div>
                ))}
                {workoutDone && <div className="doneBanner">Тренировката е завършена. Жаравата гори. 🔥</div>}
              </>
            )}
            <div className="card hint">
              <strong>Внимавай за:</strong>
              <p>Остра/режеща болка в кръста (не мускулна умора) — спри упражнението веднага и мини на по-лека вариация. Постоянна умора или лош сън — намали интензивността 2–3 дни.</p>
            </div>
          </section>
        )}

        {tab === "habits" && (
          <section>
            <h2 className="secT">Изграждам</h2>
            {HABITS_GOOD.map((h, i) => (
              <div key={i} className={`card habitRow ${checks[`hg${i}`] ? "done" : ""}`}>
                <div className="habL"><span className="habN">{h}</span><span className="habS">{streak(`hg${i}`)} дни поред</span></div>
                <Check on={!!checks[`hg${i}`]} onTap={() => toggle(`hg${i}`)} />
              </div>
            ))}
            <h2 className="secT">Премахвам <span className="secHint">отметни = избегнато днес</span></h2>
            {HABITS_BAD.map((h, i) => (
              <div key={i} className={`card habitRow bad ${checks[`hb${i}`] ? "done" : ""}`}>
                <div className="habL"><span className="habN">{h}</span><span className="habS">{streak(`hb${i}`)} дни чисто</span></div>
                <Check on={!!checks[`hb${i}`]} onTap={() => toggle(`hb${i}`)} />
              </div>
            ))}
          </section>
        )}

        {tab === "content" && (
          <section>
            <h2 className="secT">Контент · Ден {pDay + 1} {cycle > 1 && <span className="cyc">цикъл {cycle} — преизползвай формата с нов материал</span>}</h2>
            <div className={`card contCard ${checks.content ? "done" : ""}`}>
              <div className="chips"><span className="chip hot">{cont.f}</span><span className="chip">{cont.p}</span></div>
              <span className="lbl">Hook</span>
              <p className="hook">„{cont.h}“</p>
              <span className="lbl">Концепция</span>
              <p className="contD">{cont.d}</p>
              <span className="lbl">CTA</span>
              <p className="contD">{cont.c}</p>
              <div className="mealFoot">
                <span>{checks.content ? "Публикувано ✓" : "Отметни при публикуване"}</span>
                <Check on={!!checks.content} onTap={() => toggle("content")} />
              </div>
            </div>
            <div className="card hint">
              <strong>Утре ({(() => { const t2 = addDays(date, 1); return t2 <= END ? CONTENT[((challengeDay(t2) - 1) % 30 + 30) % 30].f : "—"; })()}):</strong>
              <p>{(() => { const t2 = addDays(date, 1); return t2 <= END ? CONTENT[((challengeDay(t2) - 1) % 30 + 30) % 30].h : "Край на календара."; })()}</p>
            </div>
          </section>
        )}

      </main>

      {/* BOTTOM NAV */}
      <nav className="nav">
        {[["today", "flame", "Днес"], ["food", "bowl", "Хранене"], ["train", "train", "Спорт"], ["habits", "habit", "Навици"], ["content", "cam", "Контент"]].map(([id, ic, lbl]) => (
          <button key={id} className={`navTab ${tab === id ? "act" : ""}`} onClick={() => setTab(id)}>
            <Icon name={ic} size={20} /><span>{lbl}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

/* ================= СТИЛ ================= */
const Style = () => (
  <style>{`
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Manrope:wght@400;500;600;700;800&display=swap');

  :root{
    --bg:#0C0A09; --panel:#171210; --panel2:#211913; --line:#2C231C;
    --ember:#FF4D14; --amber:#FFB86B; --text:#F5EFE8; --mut:#8D8177;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body,#root{background:var(--bg)}
  .app{min-height:100vh;background:
      radial-gradient(60% 30% at 50% -5%, rgba(255,77,20,.10), transparent 70%),
      var(--bg);
    color:var(--text);font-family:'Manrope',system-ui,sans-serif;
    max-width:480px;margin:0 auto;padding-bottom:86px}
  button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
  .loading{display:flex;flex-direction:column;gap:12px;align-items:center;justify-content:center;height:70vh;color:var(--ember);font-weight:700}


  /* header */
  .hdr{padding:14px 16px 10px;position:sticky;top:0;z-index:10;
    background:linear-gradient(rgba(12,10,9,.96),rgba(12,10,9,.88));backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line)}
  .hdrTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .hdrTopR{display:flex;gap:10px;align-items:center}
  .brand{display:flex;gap:6px;align-items:center;font-family:'Unbounded';font-weight:900;font-size:12px;letter-spacing:.28em;color:var(--ember)}
  .sync{font-size:10.5px;color:var(--mut);letter-spacing:.05em}
  .sync.err{color:#ff7b5c}
  .hdrMain{display:flex;gap:14px;align-items:center}
  .ring{position:relative;flex-shrink:0}
  .ringLbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
  .ringDay{font-family:'Unbounded';font-weight:900;font-size:19px}
  .ringOf{font-size:9px;color:var(--mut);margin-top:2px}
  .hdrInfo{flex:1;min-width:0}
  .dateNav{display:flex;align-items:center;gap:8px}
  .navBtn{width:34px;height:34px;border-radius:11px;background:var(--panel);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--mut);transition:all .15s}
  .navBtn:active:not(:disabled){transform:scale(.9);color:var(--ember)}
  .navBtn:disabled{opacity:.3}
  .dateLbl{flex:1;text-align:center;display:flex;flex-direction:column}
  .dateLbl strong{font-family:'Unbounded';font-weight:700;font-size:14px}
  .dateLbl span{font-size:11px;color:var(--mut);margin-top:2px}
  .hdrMeta{display:flex;justify-content:center;gap:10px;align-items:center;margin-top:6px}
  .pct{font-size:11px;color:var(--amber);font-weight:700}
  .todayBtn{font-size:11px;font-weight:700;color:var(--ember);border:1px solid rgba(255,77,20,.4);border-radius:999px;padding:3px 10px}

  .main{padding:16px}
  .secT{font-family:'Unbounded';font-weight:700;font-size:14px;margin:20px 0 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .secT:first-child{margin-top:4px}
  .secS{font-size:12.5px;color:var(--mut);margin:-4px 0 12px;line-height:1.5}
  .secHint{font-size:10px;color:var(--mut);font-family:'Manrope';font-weight:500;letter-spacing:.02em}
  .cyc{font-size:10px;color:var(--amber);font-family:'Manrope';font-weight:600}
  .eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ember);font-weight:800}
  .lbl{display:block;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);font-weight:800;margin:12px 0 5px}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:10px;transition:border-color .25s, background .25s}
  .card.done{border-color:rgba(255,184,107,.35);background:linear-gradient(rgba(255,120,40,.05),rgba(255,120,40,.02)),var(--panel)}

  /* stats */
  .stats{display:flex;gap:8px}
  .stat{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 6px;text-align:center}
  .stat b{font-family:'Unbounded';font-size:17px;color:var(--amber);display:block}
  .stat span{font-size:10px;color:var(--mut)}

  /* timeline */
  .tl{display:flex;flex-direction:column;gap:8px}
  .tlItem{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:11px 12px;position:relative;transition:all .25s}
  .tlItem.done{border-color:rgba(255,184,107,.35)}
  .tlItem.done .tlT{color:var(--amber)}
  .tlInfo{display:flex;gap:10px;align-items:center;padding:2px 12px;font-size:12px;color:var(--mut)}
  .tlTime{font-family:'Unbounded';font-size:10px;font-weight:700;color:var(--mut);width:38px;flex-shrink:0}
  .tlItem.done .tlTime{color:var(--amber)}
  .tlIco{width:32px;height:32px;border-radius:10px;background:var(--panel2);display:flex;align-items:center;justify-content:center;color:var(--ember);flex-shrink:0}
  .tlBody{flex:1;min-width:0;display:flex;flex-direction:column;text-align:left;gap:2px}
  .tlT{font-weight:700;font-size:13.5px;transition:color .25s}
  .tlS{font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tlItem.custom .tlIco{color:var(--amber)}
  .del{color:var(--mut);padding:4px;margin-left:-4px}

  /* checkbox */
  .chk{width:30px;height:30px;border-radius:10px;border:1.5px solid var(--line);background:var(--panel2);display:flex;align-items:center;justify-content:center;color:transparent;flex-shrink:0;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
  .chk.sm{width:24px;height:24px;border-radius:8px}
  .chk:active{transform:scale(.85)}
  .chk.on{background:linear-gradient(135deg,var(--ember),#ff7a2e);border-color:transparent;color:#1a0d05;box-shadow:0 0 12px rgba(255,77,20,.45);transform:scale(1.03)}

  /* add task */
  .addBtn{display:flex;gap:8px;align-items:center;justify-content:center;width:100%;padding:12px;margin-top:10px;border:1.5px dashed var(--line);border-radius:16px;color:var(--mut);font-weight:700;font-size:13px;transition:all .2s}
  .addBtn:active{color:var(--ember);border-color:var(--ember)}
  .addForm{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .inp{flex:1;min-width:140px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 12px;color:var(--text);font-family:inherit;font-size:14px}
  .inp.time{flex:0 0 64px;min-width:64px}
  .inp:focus{outline:none;border-color:var(--ember)}
  .btn{background:var(--ember);color:#1a0d05;font-weight:800;border-radius:12px;padding:0 16px;font-size:13px}
  .btnGhost{color:var(--mut);font-weight:700;font-size:13px;padding:0 8px}

  /* reflection */
  .refl .flames{display:flex;gap:6px;margin:4px 0 2px}
  .flame{color:var(--line);padding:4px;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
  .flame.lit{color:var(--ember);filter:drop-shadow(0 0 6px rgba(255,77,20,.6));transform:scale(1.1)}
  .flame:active{transform:scale(.85)}
  .ta{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 12px;color:var(--text);font-family:inherit;font-size:13.5px;resize:vertical;line-height:1.5}
  .ta:focus{outline:none;border-color:var(--ember)}
  .ta::placeholder{color:#5c534b}

  /* meals */
  .mealHead{display:flex;justify-content:space-between;align-items:flex-start;width:100%;text-align:left;gap:10px}
  .mealHeadL{display:flex;flex-direction:column;gap:5px;min-width:0}
  .mealN{font-weight:800;font-size:14.5px;line-height:1.3}
  .chips{display:flex;gap:5px;flex-wrap:wrap}
  .chip{font-size:10px;font-weight:700;color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:2.5px 9px;background:var(--panel2)}
  .chip.hot{color:var(--ember);border-color:rgba(255,77,20,.4)}
  .car{color:var(--mut);transform:rotate(90deg);transition:transform .25s;flex-shrink:0;margin-top:4px;display:inline-flex}
  .car.up{transform:rotate(-90deg)}
  .mealBody{animation:fadeIn .25s ease}
  .ing{font-size:13px;line-height:1.6;color:var(--text)}
  .steps{padding-left:18px;display:flex;flex-direction:column;gap:8px}
  .steps li{font-size:13px;line-height:1.55}
  .steps li::marker{color:var(--ember);font-weight:800;font-family:'Unbounded';font-size:11px}
  .mealFoot{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:11px;border-top:1px solid var(--line);font-size:12px;color:var(--mut)}
  .card.done .mealFoot span{color:var(--amber);font-weight:700}

  /* training */
  .exProg{height:5px;background:var(--panel);border-radius:99px;margin-bottom:12px;overflow:hidden}
  .exProgBar{height:100%;background:linear-gradient(90deg,var(--ember),var(--amber));border-radius:99px;transition:width .5s cubic-bezier(.22,1,.36,1);box-shadow:0 0 8px rgba(255,77,20,.5)}
  .ex{padding:11px 12px}
  .exRow{display:flex;align-items:center;gap:10px}
  .exHead{flex:1;display:flex;justify-content:space-between;align-items:center;gap:8px;text-align:left}
  .exN{font-weight:700;font-size:13.5px}
  .exR{font-family:'Unbounded';font-size:10px;color:var(--amber);font-weight:700;text-align:right;flex-shrink:0;max-width:46%}
  .exDesc{font-size:12.5px;color:var(--mut);line-height:1.55;margin-top:9px;padding-top:9px;border-top:1px solid var(--line);animation:fadeIn .25s ease}
  .card.done .exN{color:var(--amber)}
  .restCard{text-align:center;padding:26px 18px;display:flex;flex-direction:column;gap:8px;align-items:center;color:var(--amber)}
  .restCard strong{font-family:'Unbounded';font-size:15px;color:var(--text)}
  .restCard p{font-size:13px;color:var(--text);line-height:1.5}
  .doneBanner{text-align:center;font-weight:800;color:var(--amber);padding:14px;font-size:13.5px;animation:fadeIn .4s ease}
  .hint{background:var(--panel2)}
  .hint strong{font-size:12px;display:block;margin-bottom:4px;color:var(--amber)}
  .hint p{font-size:12px;color:var(--mut);line-height:1.55}

  /* habits */
  .habitRow{display:flex;justify-content:space-between;align-items:center;padding:12px 14px}
  .habL{display:flex;flex-direction:column;gap:2px}
  .habN{font-weight:700;font-size:13.5px}
  .habS{font-size:11px;color:var(--mut)}
  .habitRow.done .habN{color:var(--amber)}
  .habitRow.done .habS{color:var(--amber);opacity:.75}
  .habitRow.bad .habN{color:var(--text)}

  /* content */
  .contCard .hook{font-family:'Unbounded';font-weight:700;font-size:15px;line-height:1.45}
  .contD{font-size:13px;line-height:1.6;color:var(--text)}

  /* nav */
  .nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;display:flex;
    background:rgba(15,12,10,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);
    padding:8px 6px calc(10px + env(safe-area-inset-bottom))}
  .navTab{flex:1;display:flex;flex-direction:column;gap:3px;align-items:center;padding:6px 2px;color:var(--mut);border-radius:12px;transition:color .2s}
  .navTab span{font-size:9.5px;font-weight:700;letter-spacing:.03em}
  .navTab.act{color:var(--ember)}
  .navTab.act svg{filter:drop-shadow(0 0 6px rgba(255,77,20,.55))}
  .navTab:active{transform:scale(.93)}

  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
  `}</style>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
